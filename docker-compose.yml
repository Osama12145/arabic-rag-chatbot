version: '3.8'

services:
  # FastAPI Backend
  api:
    build: .
    container_name: chatbot-api
    ports:
      - "8000:8000"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - COHERE_API_KEY=${COHERE_API_KEY}
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION_NAME=${QDRANT_COLLECTION_NAME}
      - DATABASE_URL=postgresql://chatbot:chatbot@db:5432/chatbot_db
    depends_on:
      - db
      - qdrant
    volumes:
      - ./logs:/app/logs
      - ./temp_uploads:/app/temp_uploads
    restart: unless-stopped
    networks:
      - chatbot-network
    command: uvicorn api_server:app --host 0.0.0.0 --port 8000

  # Streamlit Frontend
  streamlit:
    build: .
    container_name: chatbot-ui
    ports:
      - "8501:8501"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - COHERE_API_KEY=${COHERE_API_KEY}
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION_NAME=${QDRANT_COLLECTION_NAME}
      - DATABASE_URL=postgresql://chatbot:chatbot@db:5432/chatbot_db
    depends_on:
      - api
    volumes:
      - ./logs:/app/logs
      - ./temp_uploads:/app/temp_uploads
    restart: unless-stopped
    networks:
      - chatbot-network
    command: streamlit run app_streamlit.py --server.port=8501

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: chatbot-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    networks:
      - chatbot-network

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: chatbot-db
    environment:
      POSTGRES_USER: chatbot
      POSTGRES_PASSWORD: chatbot
      POSTGRES_DB: chatbot_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - chatbot-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatbot"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  qdrant_data:

networks:
  chatbot-network:
    driver: bridge
